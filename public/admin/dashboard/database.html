<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Database — KYC Admin</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<header class="dashboard-mobile-header">
  <div style="display:flex;align-items:center;gap:0.75rem">
    <div class="dashboard-brand-logo">
      <svg width="18" height="18" fill="none" stroke="white" viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
    </div>
    <span class="dashboard-brand-name">KYC Admin</span>
  </div>
  <button onclick="toggleMobileSidebar()" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:white;flex-shrink:0">
    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
</header>
<div class="dashboard-sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileSidebar()"></div>

<div class="dashboard-layout">
  <aside class="dashboard-sidebar">
    <div class="dashboard-sidebar-deco-1"></div><div class="dashboard-sidebar-deco-2"></div>
    <div class="dashboard-sidebar-inner">
      <div class="dashboard-brand">
        <div class="dashboard-brand-logo"><svg width="18" height="18" fill="none" stroke="white" viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg></div>
        <div><div class="dashboard-brand-name">KYC Admin</div><div class="dashboard-brand-sub">Portal</div></div>
      </div>
      <nav class="dashboard-nav">
        <a href="/admin/dashboard" class="nav-link active"><svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
        <a href="/admin/dashboard/agents" class="nav-link"><svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Agents</a>
        </nav>
      <div class="dashboard-sidebar-footer">
        <div class="dashboard-user">
          <div class="dashboard-user-avatar" id="userInitial">A</div>
          <div style="min-width:0">
            <div class="dashboard-user-name" id="userName">Administrator</div>
            <div class="dashboard-user-role">Administrator</div>
          </div>
        </div>
        <button onclick="logoutAdmin()" class="kyc-sidebar-logout" style="width:100%"><svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Sign out</button>
      </div>
    </div>
  </aside>

  <main class="dashboard-main">
    <div class="page-header">
      <div>
        <h1 class="page-title">Database</h1>
        <p class="page-subtitle">Table statistics and record counts</p>
      </div>
    </div>
    <div id="content"><div style="text-align:center;padding:3rem"><div class="spinner" style="margin:0 auto 0.75rem"></div><p style="margin:0;color:var(--kyc-muted)">Loading...</p></div></div>
  </main>
</div>

<!-- Table Viewer Modal -->
<div id="tableModal" class="modal-overlay hidden">
  <div class="modal-backdrop" onclick="closeTableModal()"></div>
  <div class="modal-box modal-light" style="max-width:900px;width:95vw;max-height:85vh;display:flex;flex-direction:column">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <h2 class="modal-title dark" style="margin:0" id="tableModalTitle">Table</h2>
      <button onclick="closeTableModal()" class="btn-ghost" style="padding:0.25rem 0.625rem;font-size:1.25rem;line-height:1;min-height:unset">×</button>
    </div>
    <div id="tableModalBody" style="overflow:auto;flex:1"></div>
    <div id="tableModalPager" style="display:flex;align-items:center;justify-content:space-between;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--kyc-border)"></div>
  </div>
</div>

<script src="/js/utils.js"></script>
<script src="/js/admin-database.js"></script>

<!-- Phase 2: user menu (avatar popover + change password modal) -->
<script>window.KYC_ROLE = "admin";</script>
<script src="/js/user-menu.js"></script>
</body>
</html>
