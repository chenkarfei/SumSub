<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Admin Panel — SecureVerify</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<div class="login-bg">
  <div class="login-box">

    <div class="login-header">
      <div class="login-icon" style="background:rgba(99,102,241,0.1)">
        <svg width="28" height="28" fill="none" stroke="#6366f1" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </div>
      <h1 class="login-title">Admin Panel</h1>
      <p class="login-subtitle">Restricted access — authorised personnel only</p>
    </div>

    <div class="login-card">
      <div id="loginError" class="hidden"></div>

      <form id="loginForm" novalidate>
        <div style="margin-bottom:1rem">
          <label class="login-field-label" for="username">Username</label>
          <input id="username" type="text" class="login-input" placeholder="admin" autocomplete="username" required />
        </div>
        <div>
          <label class="login-field-label" for="password">Password</label>
          <input id="password" type="password" class="login-input" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" id="loginBtn" class="login-btn">Sign in</button>
      </form>
    </div>

  </div>
</div>

<script src="/js/utils.js"></script>
<script src="/js/admin-login.js"></script>

<!-- Phase 2: forgot password link + modal -->
<script>window.KYC_LOGIN_ROLE = "admin";</script>
<script src="/js/forgot-password.js"></script>
</body>
</html>
