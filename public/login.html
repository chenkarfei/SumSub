<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Sign In — SecureVerify KYC Portal</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<div class="login-bg">
  <div class="login-box">

    <div class="login-header">
      <div class="login-icon" style="background:rgba(29,78,216,0.1)">
        <svg width="28" height="28" fill="none" stroke="#1d4ed8" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <h1 class="login-title">Sign in</h1>
      <p class="login-subtitle">Enter your credentials to continue your verification</p>
    </div>

    <div class="login-card">
      <div id="loginError" class="hidden"></div>

      <form id="loginForm" novalidate>
        <div style="margin-bottom:1rem">
          <label class="login-field-label" for="email">Email address</label>
          <input id="email" type="email" class="login-input" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div style="margin-bottom:0">
          <label class="login-field-label" for="password">Password</label>
          <input id="password" type="password" class="login-input" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" id="loginBtn" class="login-btn">Sign in</button>
      </form>
    </div>

    <p class="login-footer">Having trouble? Contact your agent for assistance.</p>
  </div>
</div>

<script src="/js/utils.js"></script>
<script src="/js/login.js"></script>

<!-- Phase 2: forgot password link + modal -->
<script>window.KYC_LOGIN_ROLE = "contact";</script>
<script src="/js/forgot-password.js"></script>
</body>
</html>
