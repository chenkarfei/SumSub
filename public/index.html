<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>SecureVerify — KYC Portal</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<div class="kyc-layout" id="app">

  <!-- ── Desktop Sidebar ──────────────────────────────────────────────────── -->
  <aside class="kyc-sidebar" id="sidebar">
    <div class="kyc-sidebar-deco-1"></div>
    <div class="kyc-sidebar-deco-2"></div>
    <div class="kyc-sidebar-inner">

      <!-- Brand -->
      <div class="kyc-sidebar-brand">
        <div class="kyc-sidebar-logo">
          <svg width="22" height="22" fill="none" stroke="white" viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/>
          </svg>
        </div>
        <div>
          <div class="kyc-sidebar-brand-name">SecureVerify</div>
          <div class="kyc-sidebar-brand-sub">KYC Portal</div>
        </div>
      </div>

      <!-- Step list -->
      <nav class="kyc-step-list" id="stepList" aria-label="Verification steps"></nav>

      <!-- Trust badges -->
      <div class="kyc-trust-badges">
        <div class="kyc-trust-badge"><span class="kyc-trust-badge-icon">🔒</span><span class="kyc-trust-badge-text">256-bit SSL Encryption</span></div>
        <div class="kyc-trust-badge"><span class="kyc-trust-badge-icon">🛡</span><span class="kyc-trust-badge-text">Bank-grade Security</span></div>
        <div class="kyc-trust-badge"><span class="kyc-trust-badge-icon">✓</span><span class="kyc-trust-badge-text">Powered by Sumsub</span></div>
      </div>

      <button class="kyc-sidebar-logout" onclick="handleLogout()">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Sign out
      </button>
    </div>
  </aside>

  <!-- ── Content Wrapper ──────────────────────────────────────────────────── -->
  <div class="kyc-content-wrapper">

    <!-- Mobile Header -->
    <header class="kyc-mobile-header">
      <div class="kyc-mobile-header-inner">
        <div class="kyc-mobile-brand">
          <div class="kyc-mobile-logo">
            <svg width="16" height="16" fill="none" stroke="white" viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/>
            </svg>
          </div>
          <span class="kyc-mobile-brand-name">SecureVerify</span>
        </div>
        <div class="kyc-mobile-actions">
          <span class="kyc-step-counter hidden" id="mobileStepCounter"></span>
          <button onclick="handleLogout()" style="font-size:0.75rem;color:var(--kyc-muted);background:none;border:none;cursor:pointer;padding:0.25rem 0.5rem;min-height:unset;">Sign out</button>
        </div>
      </div>
      <div class="kyc-progress-bar-track">
        <div class="kyc-progress-bar" id="progressBar" style="width:0%"></div>
      </div>
    </header>

    <!-- Main -->
    <main class="kyc-main">
      <div class="kyc-content-max">

        <!-- Desktop heading -->
        <div class="kyc-desktop-heading" id="desktopHeading">
          <p class="kyc-step-eyebrow" id="stepEyebrow"></p>
          <h1 class="kyc-step-title" id="stepTitle"></h1>
          <p class="kyc-step-subtitle" id="stepSubtitle"></p>
        </div>

        <!-- Loading state -->
        <div id="loadingState" class="hidden" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6rem 0;animation:fadeIn 0.3s ease-out">
          <div style="width:64px;height:64px;border-radius:18px;background:var(--gradient-btn);display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;box-shadow:var(--shadow-premium)">
            <svg width="32" height="32" fill="none" stroke="white" viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
          </div>
          <div class="spinner spinner-lg" style="margin-bottom:1rem"></div>
          <p style="font-weight:600;color:var(--kyc-text);margin:0">Loading your session...</p>
          <p style="font-size:0.875rem;color:var(--kyc-muted);margin-top:0.25rem">Checking verification status</p>
        </div>

        <!-- Step content (animated on change) -->
        <div id="stepContent" class="animate-slide-up space-y-5"></div>

        <!-- Footer note (desktop) -->
        <div class="kyc-footer-note">
          <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <span>256-bit SSL encryption &bull; Your data is private and protected</span>
        </div>

      </div>
    </main>

  </div><!-- /content wrapper -->
</div><!-- /app -->

<script src="/js/utils.js?v=2"></script>
<script src="/js/app.js?v=2"></script>
</body>
</html>
